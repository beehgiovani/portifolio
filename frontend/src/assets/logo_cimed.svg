<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <style>
      .cimed-color { fill: #FFD700; }
      .text-bold { font-family: 'Arial', sans-serif; font-weight: 900; font-size: 52px; fill: #111; letter-spacing: -1px; }
      .text-light { font-family: 'Arial', sans-serif; font-weight: 300; font-size: 34px; fill: #111; letter-spacing: -0.5px; }
    </style>
  </defs>
  
  <!-- Seta Amarela (Logo Mark) -->
  <g transform="translate(10, 20)">
    <polygon points="40,40 10,40 30,20 60,20" class="cimed-color"/>
    <polygon points="30,60 0,60 20,40 50,40" class="cimed-color"/>
    <polygon points="50,40 20,40 40,20 70,20" class="cimed-color"/>
    <polygon points="70,20 40,20 60,0 90,0" class="cimed-color"/>
    <polygon points="60,40 50,50 80,20 90,10" class="cimed-color"/>
    <!-- Um formato simplificado para representar o icone da Cimed -->
    <path d="M 40,80 L 10,80 L 40,50 L 70,50 Z" class="cimed-color" />
    <path d="M 40,50 L 70,50 L 100,20 L 70,20 Z" class="cimed-color" />
    <path d="M 70,20 L 100,20 L 70,-10 L 40,-10 Z" class="cimed-color" />
  </g>
  
  <!-- Retrabalhando a Seta Exata -->
  <rect x="0" y="0" width="400" height="120" fill="transparent" />
  
  <!-- Logo Mark Oficial -->
  <g transform="translate(20, 25) scale(0.8)">
    <path d="M22.5 73.5 L55 73.5 L22.5 106 L0 106 Z" fill="#FFC107" />
    <path d="M55 73.5 L22.5 41 L55 41 L87.5 73.5 Z" fill="#FFC107" />
    <path d="M22.5 41 L55 41 L87.5 8.5 L55 8.5 Z" fill="#FFD700" />
    <path d="M55 8.5 L87.5 8.5 L120 -24 L87.5 -24 Z" fill="#FFD700" />
    <polygon points="87.5,73.5 120,41 120,73.5" fill="#FFA000" />
    <polygon points="55,41 87.5,8.5 87.5,41" fill="#FFA000" />
  </g>

  <!-- Typography -->
  <text x="130" y="65" class="text-bold">CIMED</text>
  <text x="130" y="100" class="text-light">Experience</text>
</svg>
