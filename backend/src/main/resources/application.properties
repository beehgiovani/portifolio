# =============================================================
# PROFILE: Docker / PostgreSQL (Dados Persistidos)
# Para usar: docker compose up -d (na raiz do projeto)
# =============================================================

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio_db}
spring.datasource.username=${SPRING_DATASOURCE_URL_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_URL_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080
spring.jpa.open-in-view=false

